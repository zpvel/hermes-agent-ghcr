name: Build and Publish GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: hermes-ghcr-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: nousresearch/hermes-agent:latest

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.plan.outputs.should_build }}
      build_reason: ${{ steps.plan.outputs.build_reason }}
      upstream_digest: ${{ steps.plan.outputs.upstream_digest }}
      current_base_digest: ${{ steps.plan.outputs.current_base_digest }}

    steps:
      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide Whether To Build
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          should_build=false
          build_reason=""

          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            should_build=true
            build_reason="event:${GITHUB_EVENT_NAME}"
          fi

          echo "Pulling upstream base image: ${BASE_IMAGE}"
          docker pull "${BASE_IMAGE}" >/dev/null
          upstream_repo_digest="$(docker image inspect "${BASE_IMAGE}" --format '{{join .RepoDigests "\n"}}' | grep '^'"${BASE_IMAGE%:latest}"'@' | head -n1 || true)"
          if [[ -z "${upstream_repo_digest}" ]]; then
            echo "Failed to resolve upstream repo digest" >&2
            exit 1
          fi
          upstream_digest="${upstream_repo_digest#*@}"

          current_base_digest=""
          current_image="${REGISTRY}/${IMAGE_NAME}:latest"
          if docker pull "${current_image}" >/dev/null 2>&1; then
            current_base_digest="$(docker image inspect "${current_image}" --format '{{ index .Config.Labels "org.opencontainers.image.base.digest" }}' || true)"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            if [[ -z "${current_base_digest}" ]]; then
              should_build=true
              build_reason="schedule:missing-current-base-digest"
            elif [[ "${current_base_digest}" != "${upstream_digest}" ]]; then
              should_build=true
              build_reason="schedule:upstream-changed"
            else
              build_reason="schedule:no-upstream-change"
            fi
          fi

          {
            echo "should_build=${should_build}"
            echo "build_reason=${build_reason}"
            echo "upstream_digest=${upstream_digest}"
            echo "current_base_digest=${current_base_digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Decision Summary
        shell: bash
        run: |
          {
            echo "## Build Decision"
            echo ""
            echo "- event: \`${GITHUB_EVENT_NAME}\`"
            echo "- reason: \`${{ steps.plan.outputs.build_reason }}\`"
            echo "- upstream digest: \`${{ steps.plan.outputs.upstream_digest }}\`"
            if [[ -n "${{ steps.plan.outputs.current_base_digest }}" ]]; then
              echo "- current custom image base digest: \`${{ steps.plan.outputs.current_base_digest }}\`"
            else
              echo "- current custom image base digest: \`(missing)\`"
            fi
            echo "- should build: \`${{ steps.plan.outputs.should_build }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - plan
    if: needs.plan.outputs.should_build == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.base.name=${{ env.BASE_IMAGE }}
            org.opencontainers.image.base.digest=${{ needs.plan.outputs.upstream_digest }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: hermes-agent:test
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          docker run --rm \
            -v /tmp/hermes-test:/opt/data \
            --entrypoint /opt/hermes/docker/entrypoint.sh \
            hermes-agent:test --help

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Summary
        shell: bash
        run: |
          {
            echo "## Publish Result"
            echo ""
            echo "- reason: \`${{ needs.plan.outputs.build_reason }}\`"
            echo "- upstream digest: \`${{ needs.plan.outputs.upstream_digest }}\`"
            echo "- published image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
          } >> "${GITHUB_STEP_SUMMARY}"
