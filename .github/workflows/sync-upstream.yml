name: Sync Official Upstream

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: true

env:
  UPSTREAM_REPO: https://github.com/NousResearch/hermes-agent.git

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect upstream head
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          last_synced="$(python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path(".upstream-sync.json")
          if not path.exists():
              print("")
          else:
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  print((data.get("upstream_commit") or "").strip())
              except Exception:
                  print("")
          PY
          )"

          upstream_sha="$(git ls-remote "${UPSTREAM_REPO}" refs/heads/main | awk '{print $1}')"
          test -n "${upstream_sha}"

          echo "last_synced=${last_synced}" >> "${GITHUB_OUTPUT}"
          echo "upstream_sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"

          if [[ "${upstream_sha}" == "${last_synced}" ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Official upstream has not changed."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Upstream changed: ${last_synced:-<none>} -> ${upstream_sha}"
          fi

      - name: Clone official upstream
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "${UPSTREAM_REPO}" /tmp/hermes-upstream

      - name: Guard overlay-managed files
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          last_synced="${{ steps.detect.outputs.last_synced }}"
          upstream_sha="${{ steps.detect.outputs.upstream_sha }}"

          if [[ -z "${last_synced}" ]]; then
            echo "No previous upstream baseline recorded; skipping overlay conflict check."
            exit 0
          fi

          if ! git -C /tmp/hermes-upstream cat-file -e "${last_synced}^{commit}" 2>/dev/null; then
            echo "Recorded upstream baseline ${last_synced} is not available in cloned history."
            echo "Failing safe instead of overwriting overlay-managed files blindly."
            exit 1
          fi

          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          last_synced = "${{ steps.detect.outputs.last_synced }}".strip()
          upstream_sha = "${{ steps.detect.outputs.upstream_sha }}".strip()

          changed = subprocess.check_output(
              ["git", "-C", "/tmp/hermes-upstream", "diff", "--name-only", last_synced, upstream_sha],
              text=True,
          ).splitlines()
          changed_set = {line.strip() for line in changed if line.strip()}

          overlay_root = Path(".upstream-overlay")
          overlay_files = []
          if overlay_root.exists():
              overlay_files = sorted(
                  str(path.relative_to(overlay_root)).replace("\\", "/")
                  for path in overlay_root.rglob("*")
                  if path.is_file()
              )

          conflicts = sorted(changed_set.intersection(overlay_files))
          if conflicts:
              print("Official upstream changed overlay-managed files:")
              for item in conflicts:
                  print(f" - {item}")
              raise SystemExit(1)

          print("Overlay guard passed.")
          PY

      - name: Sync repository tree to upstream plus local overlay
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/repo-keep
          cp -a .github /tmp/repo-keep/.github
          cp -a .upstream-overlay /tmp/repo-keep/.upstream-overlay

          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -a --delete --exclude '.git' /tmp/hermes-upstream/ "${GITHUB_WORKSPACE}/"

          rm -rf "${GITHUB_WORKSPACE}/.github"
          cp -a /tmp/repo-keep/.github "${GITHUB_WORKSPACE}/.github"
          cp -a /tmp/repo-keep/.upstream-overlay "${GITHUB_WORKSPACE}/.upstream-overlay"
          rsync -a /tmp/repo-keep/.upstream-overlay/ "${GITHUB_WORKSPACE}/"

          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          overlay_root = Path(".upstream-overlay")
          overlay_files = sorted(
              str(path.relative_to(overlay_root)).replace("\\", "/")
              for path in overlay_root.rglob("*")
              if path.is_file()
          )

          payload = {
              "upstream_repo": "https://github.com/NousResearch/hermes-agent.git",
              "upstream_branch": "main",
              "upstream_commit": "${{ steps.detect.outputs.upstream_sha }}",
              "synced_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "overlay_files": overlay_files,
          }
          Path(".upstream-sync.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          git status --short

      - name: Commit and push sync
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "7461151"
          git config user.email "390316694@qq.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No file changes after sync; nothing to commit."
            exit 0
          fi

          short_sha="${{ steps.detect.outputs.upstream_sha }}"
          short_sha="${short_sha:0:7}"
          git commit -m "chore: sync upstream to ${short_sha}"
          git push origin HEAD:main
